<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能体记忆系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            margin-top: 20px;
        }
        .nav-tabs {
            margin-bottom: 20px;
        }
        .tab-content {
            background-color: white;
            border: 1px solid #dee2e6;
            border-top: none;
            padding: 20px;
            border-radius: 0 0 5px 5px;
        }
        .memory-item {
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }
        .memory-item.important {
            border-left: 4px solid #007bff;
        }
        .memory-content {
            margin-top: 5px;
            font-size: 14px;
        }
        .memory-meta {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .chat-container {
            margin-top: 20px;
        }
        #chat-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
        }
        #chat-messages {
            border: 1px solid #ced4da;
            border-radius: 5px;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        .user-message {
            background-color: #e3f2fd;
            align-self: flex-end;
        }
        .agent-message {
            background-color: #f1f1f1;
            align-self: flex-start;
        }
        .stats-card {
            background-color: white;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">智能体记忆系统可视化</h1>

        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stats-card">
                    <h5>记忆统计</h5>
                    <p>长期记忆数量: <span id="long-term-count">加载中...</span></p>
                    <p>工作记忆数量: <span id="working-count">加载中...</span></p>
                    <button id="cleanup-btn" class="btn btn-sm btn-danger">手动清理</button>
                </div>
            </div>
        </div>

        <!-- 标签页导航 -->
        <ul class="nav nav-tabs" id="memoryTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="chat-tab" data-bs-toggle="tab" data-bs-target="#chat" type="button" role="tab">对话</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="working-tab" data-bs-toggle="tab" data-bs-target="#working" type="button" role="tab">工作记忆</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="long-term-tab" data-bs-toggle="tab" data-bs-target="#long-term" type="button" role="tab">长期记忆</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="semantic-tab" data-bs-toggle="tab" data-bs-target="#semantic" type="button" role="tab">语义记忆</button>
            </li>
        </ul>

        <!-- 标签页内容 -->
        <div class="tab-content" id="memoryTabsContent">
            <!-- 对话标签页 -->
            <div class="tab-pane fade show active" id="chat" role="tabpanel">
                <div class="chat-container">
                    <div id="chat-messages"></div>
                    <div class="input-group">
                        <input type="text" id="chat-input" class="form-control" placeholder="输入消息...">
                        <button id="send-btn" class="btn btn-primary">发送</button>
                    </div>
                </div>
            </div>

            <!-- 工作记忆标签页 -->
            <div class="tab-pane fade" id="working" role="tabpanel">
                <h3>工作记忆</h3>
                <div id="working-memory-content" class="loading">加载中...</div>
            </div>

            <!-- 长期记忆标签页 -->
            <div class="tab-pane fade" id="long-term" role="tabpanel">
                <h3>长期记忆</h3>
                <div class="mb-3">
                    <input type="text" id="long-term-search" class="form-control" placeholder="搜索记忆...">
                    <button id="search-btn" class="btn btn-sm btn-primary mt-2">搜索</button>
                </div>
                <div id="long-term-memory-content" class="loading">加载中...</div>
            </div>

            <!-- 语义记忆标签页 -->
            <div class="tab-pane fade" id="semantic" role="tabpanel">
                <h3>语义记忆</h3>
                <div class="mb-3">
                    <input type="text" id="semantic-search" class="form-control" placeholder="搜索概念...">
                    <button id="semantic-search-btn" class="btn btn-sm btn-primary mt-2">搜索</button>
                </div>
                <div id="semantic-memory-content" class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 用户ID
        const userId = 'hust_student_2026';

        // 加载记忆数据
        function loadWorkingMemory() {
            fetch('/api/memory/working')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const content = document.getElementById('working-memory-content');
                        content.innerHTML = '';

                        if (data.data.length === 0) {
                            content.innerHTML = '<p>暂无工作记忆</p>';
                            return;
                        }

                        data.data.forEach(memory => {
                            const memoryItem = document.createElement('div');
                            memoryItem.className = 'memory-item' + (memory.is_important ? ' important' : '');
                            memoryItem.innerHTML = `
                                <div class="memory-meta">
                                    <strong>${memory.role}</strong> - ${new Date(memory.timestamp * 1000).toLocaleString()}
                                    ${memory.is_important ? '<span class="badge bg-primary">重要</span>' : ''}
                                </div>
                                <div class="memory-content">${memory.content}</div>
                            `;
                            content.appendChild(memoryItem);
                        });

                        // 更新工作记忆数量
                        document.getElementById('working-count').textContent = data.data.length;
                    } else {
                        document.getElementById('working-memory-content').innerHTML = `<p class="text-danger">加载失败: ${data.error}</p>`;
                    }
                })
                .catch(error => {
                    document.getElementById('working-memory-content').innerHTML = `<p class="text-danger">加载失败: ${error.message}</p>`;
                });
        }

        function loadLongTermMemory(query = '') {
            fetch(`/api/memory/long-term?user_id=${userId}&query=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const content = document.getElementById('long-term-memory-content');
                        content.innerHTML = '';

                        if (data.data.length === 0) {
                            content.innerHTML = '<p>暂无长期记忆</p>';
                            return;
                        }

                        data.data.forEach(memory => {
                            const memoryItem = document.createElement('div');
                            memoryItem.className = 'memory-item';
                            memoryItem.innerHTML = `
                                <div class="memory-meta">
                                    <strong>记忆ID:</strong> ${memory.id} - ${memory.created_at}
                                </div>
                                <div class="memory-content">${memory.memory || memory.text}</div>
                                ${memory.score ? `<div class="memory-meta">相关度: ${(memory.score * 100).toFixed(2)}%</div>` : ''}
                            `;
                            content.appendChild(memoryItem);
                        });
                    } else {
                        document.getElementById('long-term-memory-content').innerHTML = `<p class="text-danger">加载失败: ${data.error}</p>`;
                    }
                })
                .catch(error => {
                    document.getElementById('long-term-memory-content').innerHTML = `<p class="text-danger">加载失败: ${error.message}</p>`;
                });
        }

        function loadSemanticMemory(concept = '') {
            fetch(`/api/memory/semantic?user_id=${userId}&concept=${encodeURIComponent(concept)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const content = document.getElementById('semantic-memory-content');
                        content.innerHTML = '';

                        if (data.data.length === 0) {
                            content.innerHTML = '<p>暂无语义记忆</p>';
                            return;
                        }

                        data.data.forEach(memory => {
                            const memoryItem = document.createElement('div');
                            memoryItem.className = 'memory-item';
                            memoryItem.innerHTML = `
                                <div class="memory-meta">
                                    <strong>概念:</strong> ${memory.concept}
                                </div>
                                <div class="memory-content">${memory.definition || '无定义'}</div>
                                <div class="memory-meta">
                                    <strong>更新时间:</strong> ${memory.updated_at}
                                </div>
                            `;
                            content.appendChild(memoryItem);
                        });
                    } else {
                        document.getElementById('semantic-memory-content').innerHTML = `<p class="text-danger">加载失败: ${data.error}</p>`;
                    }
                })
                .catch(error => {
                    document.getElementById('semantic-memory-content').innerHTML = `<p class="text-danger">加载失败: ${error.message}</p>`;
                });
        }

        function loadMemoryCount() {
            fetch(`/api/memory/count?user_id=${userId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('long-term-count').textContent = data.data;
                    } else {
                        document.getElementById('long-term-count').textContent = '加载失败';
                    }
                })
                .catch(error => {
                    document.getElementById('long-term-count').textContent = '加载失败';
                });
        }

        // 发送聊天消息
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();

            if (!message) return;

            // 添加用户消息到聊天窗口
            addMessage('user', message);
            input.value = '';

            // 发送请求
            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    user_id: userId,
                    input: message
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 添加智能体回复
                    addMessage('agent', data.response);

                    // 重新加载记忆数据
                    loadWorkingMemory();
                    loadMemoryCount();
                } else {
                    addMessage('agent', `错误: ${data.error}`);
                }
            })
            .catch(error => {
                addMessage('agent', `错误: ${error.message}`);
            });
        }

        // 添加消息到聊天窗口
        function addMessage(role, content) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;
            messageDiv.innerHTML = `<strong>${role === 'user' ? '用户' : '智能体'}:</strong> ${content}`;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 手动清理
        function cleanup() {
            if (confirm('确定要执行清理吗？')) {
                fetch('/api/cleanup', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('清理成功');
                        // 重新加载数据
                        loadWorkingMemory();
                        loadLongTermMemory();
                        loadSemanticMemory();
                        loadMemoryCount();
                    } else {
                        alert(`清理失败: ${data.error}`);
                    }
                })
                .catch(error => {
                    alert(`清理失败: ${error.message}`);
                });
            }
        }

        // 事件监听
        document.addEventListener('DOMContentLoaded', function() {
            // 加载初始数据
            loadWorkingMemory();
            loadLongTermMemory();
            loadSemanticMemory();
            loadMemoryCount();

            // 发送按钮点击事件
            document.getElementById('send-btn').addEventListener('click', sendMessage);

            // 回车键发送消息
            document.getElementById('chat-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // 搜索按钮点击事件
            document.getElementById('search-btn').addEventListener('click', function() {
                const query = document.getElementById('long-term-search').value;
                loadLongTermMemory(query);
            });

            // 语义记忆搜索
            document.getElementById('semantic-search-btn').addEventListener('click', function() {
                const concept = document.getElementById('semantic-search').value;
                loadSemanticMemory(concept);
            });

            // 手动清理按钮
            document.getElementById('cleanup-btn').addEventListener('click', cleanup);

            // 标签页切换时重新加载数据
            const tabs = document.querySelectorAll('#memoryTabs button');
            tabs.forEach(tab => {
                tab.addEventListener('shown.bs.tab', function(e) {
                    const tabId = e.target.getAttribute('data-bs-target');
                    if (tabId === '#working') {
                        loadWorkingMemory();
                    } else if (tabId === '#long-term') {
                        loadLongTermMemory();
                    } else if (tabId === '#semantic') {
                        loadSemanticMemory();
                    }
                });
            });
        });
    </script>
</body>
</html>
